# fly.toml app configuration file generated for web-travel-embedding on 2026-02-26T21:40:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'web-travel-embedding'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
